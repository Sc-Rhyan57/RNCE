name: Build
on:
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      target:
        description: 'Build Target'
        required: true
        default: 'both'
        type: choice
        options:
          - android

permissions:
  contents: write

jobs:
  setup-keystore:
    if: inputs.buildType == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check or generate keystore.jks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EXISTING_STORE_PASS: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          EXISTING_KEY_PASS: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="app/keystore.jks"

          if [ -f "$KEYSTORE_PATH" ]; then
            echo "keystore.jks already exists, skipping."
            exit 0
          fi

          if [ -z "$EXISTING_STORE_PASS" ]; then
            STORE_PASS=$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9' | head -c 32)
            gh secret set KEYSTORE_STORE_PASSWORD --body "$STORE_PASS" --repo "$REPO"
          else
            STORE_PASS="$EXISTING_STORE_PASS"
          fi

          if [ -z "$EXISTING_KEY_PASS" ]; then
            KEY_PASS=$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9' | head -c 32)
            gh secret set KEYSTORE_KEY_PASSWORD --body "$KEY_PASS" --repo "$REPO"
          else
            KEY_PASS="$EXISTING_KEY_PASS"
          fi

          keytool -genkeypair \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$STORE_PASS" \
            -keypass "$KEY_PASS" \
            -dname "CN=Release, OU=Android, O=App, L=BR, ST=BR, C=BR" \
            -noprompt

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$KEYSTORE_PATH"
          git commit -m "chore: add release keystore.jks [skip ci]"
          git push

  build-android:
    if: inputs.target == 'android' || inputs.target == 'both'
    runs-on: ubuntu-latest
    needs:
      - setup-keystore
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate Gradle wrapper
        run: |
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 8.7
            chmod +x ./gradlew
          fi

      - name: Build APK
        run: ./gradlew :app:assemble${{ inputs.buildType == 'release' && 'Release' || 'Debug' }}
        env:
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: app/build/outputs/apk/${{ inputs.buildType }}/*.apk

  release:
    if: inputs.buildType == 'release'
    runs-on: ubuntu-latest
    needs:
      - build-android
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: RNCE v1.0.${{ github.run_number }}
          files: dist/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
