name: Build

on:
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      target:
        description: 'Build Target'
        required: true
        default: 'both'
        type: choice
        options:
          - android

permissions:
  contents: write

jobs:
  # ─── Android ───────────────────────────────────────────────────────────────
  build-android:
    if: inputs.target == 'android' || inputs.target == 'both'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build APK
        run: gradle :app:assemble${{ inputs.buildType == 'release' && 'Release' || 'Debug' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: app/build/outputs/apk/${{ inputs.buildType }}/*.apk

  # ─── Release única ─────────────────────────────────────────────────────────
  release:
    if: inputs.buildType == 'release'
    runs-on: ubuntu-latest
    needs:
      - build-android
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: RNCE v1.0.${{ github.run_number }}
          files: dist/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
