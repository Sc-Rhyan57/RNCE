name: Build
on:
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      target:
        description: 'Build Target'
        required: true
        default: 'both'
        type: choice
        options:
          - android

permissions:
  contents: write

jobs:
  # ─── Keystore (apenas release) ─────────────────────────────────────────────
  setup-keystore:
    if: inputs.buildType == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check or generate keystore.jks
        run: |
          KEYSTORE_PATH="app/keystore.jks"

          if [ -f "$KEYSTORE_PATH" ]; then
            echo "✅ keystore.jks já existe — nada a fazer."
          else
            echo "🔑 Gerando novo keystore.jks..."
            keytool -genkeypair \
              -alias release \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -keystore "$KEYSTORE_PATH" \
              -storepass "${{ secrets.KEYSTORE_STORE_PASSWORD }}" \
              -keypass  "${{ secrets.KEYSTORE_KEY_PASSWORD }}" \
              -dname    "CN=${{ secrets.KEYSTORE_CN || 'Release' }}, OU=Android, O=App, L=BR, ST=BR, C=BR" \
              -noprompt

            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$KEYSTORE_PATH"
            git commit -m "chore: add release keystore.jks [skip ci]"
            git push
            echo "✅ keystore.jks gerado e enviado ao repositório."
          fi

  # ─── Android ───────────────────────────────────────────────────────────────
  build-android:
    if: inputs.target == 'android' || inputs.target == 'both'
    runs-on: ubuntu-latest
    needs:
      - setup-keystore
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Configure signing (release only)
        if: inputs.buildType == 'release'
        run: |
          cat >> app/build.gradle <<'EOF'

          android {
              signingConfigs {
                  release {
                      storeFile     file("keystore.jks")
                      storePassword System.getenv("KEYSTORE_STORE_PASSWORD")
                      keyAlias      "release"
                      keyPassword   System.getenv("KEYSTORE_KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF
        env:
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD:   ${{ secrets.KEYSTORE_KEY_PASSWORD }}

      - name: Build APK
        run: gradle :app:assemble${{ inputs.buildType == 'release' && 'Release' || 'Debug' }}
        env:
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD:   ${{ secrets.KEYSTORE_KEY_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: app/build/outputs/apk/${{ inputs.buildType }}/*.apk

  # ─── Release única ─────────────────────────────────────────────────────────
  release:
    if: inputs.buildType == 'release'
    runs-on: ubuntu-latest
    needs:
      - build-android
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: RNCE v1.0.${{ github.run_number }}
          files: dist/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
